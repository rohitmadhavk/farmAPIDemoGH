name: build-action
run-name: ${{ startsWith(github.ref, 'refs/tags/') && format('[{0}] [{1}] Building App', github.ref_name, github.event.head_commit.message || 'no commit message') || 'Building App' }}
on: [push]
jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.313'
    - name: Install dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test with the dotnet CLI
      run: dotnet test --no-build