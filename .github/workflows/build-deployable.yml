name: build-deployable
run-name: ${{ startsWith(github.ref, 'refs/tags/') && format('[{0}] [{1}] Building Deployable Artifact', github.ref_name, github.event.head_commit.message || 'no commit message') || 'Building Deployable Artifact' }}
on: 
    push:
    workflow_dispatch:
        inputs:
            environment:
                description: "The environment to deploy to"
                required: true
                default: "test"
                type: choice
                options:
                - dev
                - staging
                - production
                
jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.313'
    - name: Install dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore
    - name: Test with the dotnet CLI
      run: dotnet test --configuration Release --no-build
    - name: Publish
      run: dotnet publish FarmAPI/FarmAPI.csproj --configuration Release --no-build --output ./publish
    - uses: actions/upload-artifact@v4
      with:
        name: package-app-${{github.run_number}}
        path: ./publish

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Deploy Artifact to Azure App Service Staging
        uses: actions/download-artifact@v5
        with:
          name: 
            package-app-${{github.run_number}}
      - name: Print
        run: echo "${{ vars.PRINT_STRING_ENV_MSG }}"

  deploy-staging:
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy Artifact to Azure App Service Staging
        uses: actions/download-artifact@v5
        with:
          name: 
            package-app-${{github.run_number}}
      - name: Print
        run: echo "${{ vars.PRINT_STRING_ENV_MSG }}"

  deploy-prod:
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy Artifact to Azure App Service Prod
        uses: actions/download-artifact@v5
        with:
          name: 
            package-app-${{github.run_number}}
      - name: Print
        run: echo "${{ vars.PRINT_STRING_ENV_MSG }}"
  
  
